{% extends 'base.html' %}
{% load static %}
{% block css %}{% endblock %}
 
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h1>Forgot Password?</h1>
    <p class="subtitle">Enter the email address on your account and we'll send you a reset link.</p>
 
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label for="id_email">Email address</label>
        <input type="email" name="email" id="id_email" placeholder="you@example.com" required>
      </div>
      <button type="submit" class="btn-submit">Send Reset Link</button>
    </form>
 
    <div class="auth-links">
      <p><a href="{% url 'Login' %}">← Back to login</a></p>
    </div>
  </div>
</div>
{% endblock %}
