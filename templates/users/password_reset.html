{% extends 'base.html' %}
{% load static %}
{% block css %}
<style>
  :root {
    --ink: #1a1a2e;
    --muted: #6b7280;
    --accent: #e63946;
    --surface: #ffffff;
    --border: #e5e7eb;
    --radius: 12px;
  }
  .auth-wrap {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  .auth-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 2.5rem;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 4px 24px rgba(0,0,0,.06);
  }
  .auth-card h1 {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: .5rem;
    letter-spacing: -.02em;
  }
  .auth-card .subtitle {
    color: var(--muted);
    font-size: .9rem;
    margin-bottom: 1.75rem;
    line-height: 1.5;
  }
  .form-group { margin-bottom: 1.25rem; }
  .form-group label {
    display: block;
    font-size: .8rem;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: .4rem;
    text-transform: uppercase;
    letter-spacing: .06em;
  }
  .form-group input {
    width: 100%;
    padding: .7rem 1rem;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-size: .95rem;
    color: var(--ink);
    transition: border-color .2s;
    box-sizing: border-box;
  }
  .form-group input:focus { outline: none; border-color: var(--accent); }
  .btn-primary {
    width: 100%;
    padding: .85rem;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity .2s;
    margin-top: .5rem;
  }
  .btn-primary:hover { opacity: .88; }
  .back-link {
    display: block;
    text-align: center;
    margin-top: 1.25rem;
    color: var(--muted);
    font-size: .9rem;
    text-decoration: none;
  }
  .back-link:hover { color: var(--accent); }
</style>
{% endblock %}
 
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h1>Forgot your password?</h1>
    <p class="subtitle">Enter the email address for your account and we'll send you a reset link.</p>
 
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label for="id_email">Email address</label>
        <input type="email" name="email" id="id_email" placeholder="you@example.com" required>
      </div>
      <button type="submit" class="btn-primary">Send Reset Link</button>
    </form>
 
    <a href="{% url 'Login' %}" class="back-link">← Back to login</a>
  </div>
</div>
{% endblock %}
