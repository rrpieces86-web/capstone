{% extends 'base.html' %}
{% load static %}
{% block css %}{% endblock %}
 
{% block content %}
<div class="auth-wrap">
  <div class="auth-card">
    <h1>Welcome Back</h1>
    <p class="subtitle">Log in to your USS account to continue shopping.</p>
 
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn-submit">Log In</button>
    </form>
 
    <div class="auth-links">
      <p><a href="{% url 'password_reset' %}">Forgot your password?</a></p>
      <p style="margin-top:.5rem;">Don't have an account? <a href="{% url 'Signup' %}">Sign up</a></p>
    </div>
  </div>
</div>
{% endblock %}
