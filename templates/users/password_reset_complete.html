{% extends 'base.html' %}
{% block content %}
<style>
  .info-wrap { min-height:70vh; display:flex; align-items:center; justify-content:center; padding:2rem; }
  .info-card { background:#fff; border:1px solid #e5e7eb; border-radius:12px; padding:3rem 2.5rem; max-width:420px; width:100%; text-align:center; box-shadow:0 4px 24px rgba(0,0,0,.06); }
  .icon { font-size:3rem; margin-bottom:1rem; }
  h1 { font-size:1.5rem; font-weight:700; color:#1a1a2e; margin-bottom:.75rem; }
  p { color:#6b7280; line-height:1.6; }
  .btn { display:inline-block; margin-top:1.5rem; padding:.75rem 2rem; background:#e63946; color:#fff; border-radius:8px; text-decoration:none; font-weight:600; transition:opacity .2s; }
  .btn:hover { opacity:.88; }
</style>
<div class="info-wrap">
  <div class="info-card">
    <div class="icon">✅</div>
    <h1>Password updated!</h1>
    <p>Your password has been set. You can now log in with your new credentials.</p>
    <a href="{% url 'Login' %}" class="btn">Go to Login</a>
  </div>
</div>
{% endblock %}
