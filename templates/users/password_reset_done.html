{% extends 'base.html' %}
{% block content %}
<style>
  .info-wrap {
    min-height: 70vh; display: flex; align-items: center; justify-content: center; padding: 2rem;
  }
  .info-card {
    background: #fff; border: 1px solid #e5e7eb; border-radius: 12px;
    padding: 3rem 2.5rem; max-width: 420px; width: 100%;
    text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,.06);
  }
  .icon { font-size: 3rem; margin-bottom: 1rem; }
  .info-card h1 { font-size: 1.5rem; font-weight: 700; color: #1a1a2e; margin-bottom: .75rem; }
  .info-card p { color: #6b7280; line-height: 1.6; }
  .info-card a { color: #e63946; text-decoration: none; font-weight: 600; }
</style>
<div class="info-wrap">
  <div class="info-card">
    <div class="icon">📬</div>
    <h1>Check your email</h1>
    <p>
      If an account with that address exists, we've sent a password reset link.
      Check your inbox (and spam folder, just in case).<br><br>
      <a href="{% url 'Login' %}">Back to login</a>
    </p>
  </div>
</div>
{% endblock %}
