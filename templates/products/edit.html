{% extends 'base.html' %}
{% load static %}
{% block title %}
    Edit Product
{% endblock %}
{% block css %}
<link rel="stylesheet" href="{% static 'css/public.css' %}">
{% endblock %}

{% block content %}
    <div class="product-form-wrap">
        <h1>Edit Product</h1>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <input type="submit" value="Edit" class="btn btn-success">
        </form>
    </div>
{% endblock %}
