{% extends 'base.html' %}

{% block title %}
    Product #{{ single_product.id }}
{% endblock %}

{% load static %}

{% block content %}
    <div>
        <h1>{{ single_service.title }}</h1>
        <h3>{{ single_service.description }}</h3>
        <span>{{ single_service.price }}</span>
        <span>{{ single_service.quantity }}</span>
        <a href="{% url 'edit_service' single_service.id %}" class="btn btn-primary">edit</a>
        <a href="{% url 'delete_product' single_service.id %}" class="btn btn-danger">delete</a>
    </div>
{% endblock %}
